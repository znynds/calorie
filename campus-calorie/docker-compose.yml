services:
  campus-calorie:
    build: .
    container_name: campus-calorie
    ports:
      - "3000:3000"
    volumes:
      # 整个数据目录挂载，SQLite WAL 文件自然持久化
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/foods',r=>process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3
